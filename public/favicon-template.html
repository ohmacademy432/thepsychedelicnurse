<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Favicon raster template — scales to viewport</title>
<style>
  * { margin: 0; padding: 0; }
  html, body {
    background: #F5F0E4;
    width: 100vw;
    height: 100vw;
    overflow: hidden;
  }
  svg {
    display: block;
    width: 100vw;
    height: 100vw;
  }
</style>
</head>
<body>
  <svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">

  </svg>
</body>
</html>
