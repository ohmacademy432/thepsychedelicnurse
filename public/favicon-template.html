<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Favicon raster template (screenshot the square at 180x180 for apple-touch-icon, 32x32 for favicon.ico)</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #e8e1d4;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 40px;
  }
  .icon {
    width: 180px;
    height: 180px;
    background: #F5F0E4;
    border-radius: 28px;
    display: flex;
    justify-content: center;
    align-items: center;
    position: relative;
    overflow: hidden;
  }
  .leaf {
    width: 120px;
    height: 156px;
  }
</style>
</head>
<body>
  <div class="icon">
    <svg class="leaf" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
      <path d="M32 6 C46 18 46 46 32 58 C18 46 18 18 32 6 Z" fill="#1F3329"/>
      <path d="M32 12 L32 52" stroke="#F5F0E4" stroke-width="1.5" stroke-linecap="round"/>
    </svg>
  </div>
</body>
</html>
