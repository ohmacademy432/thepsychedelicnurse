<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>OG default template (screenshot at 1200x630)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    width: 1200px;
    height: 630px;
    background: #F5F0E4;
    font-family: 'Cormorant Garamond', 'Iowan Old Style', Georgia, serif;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 96px;
    color: #1F3329;
    position: relative;
  }
  .eyebrow {
    font-family: 'Jost', system-ui, sans-serif;
    font-size: 15px;
    letter-spacing: 0.26em;
    text-transform: uppercase;
    color: #5D7659;
    margin-bottom: 40px;
    font-weight: 500;
  }
  h1 {
    font-size: 108px;
    color: #1F3329;
    line-height: 1.0;
    letter-spacing: -1.5px;
    font-weight: 400;
    text-align: center;
    margin: 0 0 32px 0;
  }
  h1 em {
    font-style: italic;
    font-weight: 400;
  }
  .tagline {
    font-style: italic;
    font-size: 30px;
    color: #2A2520;
    text-align: center;
    max-width: 900px;
    line-height: 1.35;
    font-weight: 400;
  }
  .mark {
    position: absolute;
    bottom: 48px;
    left: 50%;
    transform: translateX(-50%);
    font-family: 'Jost', system-ui, sans-serif;
    font-size: 13px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: #8C8579;
    font-weight: 500;
  }
</style>
</head>
<body>
  <div class="eyebrow">HARM REDUCTION · EDUCATION · INTEGRATION</div>
  <h1>The <em>Psychedelic</em> Nurse</h1>
  <div class="tagline">Sacred medicine, grounded in clinical rigor.</div>
  <div class="mark">APRIL BOGLE, RN</div>
</body>
</html>
